        <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6"/><path d="M6 6l4 2-4 2V6z" fill="currentColor" stroke="none"/></svg></span>
        Focus Mode
      </div>
      <div class="nav-item" onclick="window.location.href='dashboard.html#settings'">
        <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg></span>
        Settings
      </div>
    </nav>

    <div class="sidebar-user" onclick="handleLogout()">
      <div class="user-avatar" id="user-avatar">E</div>
      <div class="user-info">
        <div class="user-name" id="user-name-display">Emily Johnson</div>
        <div class="user-email">emily@example.com</div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Habits</div>
      <div class="topbar-actions">
        <div class="icon-btn" title="Toggle dark mode" onclick="setDarkMode(!document.body.classList.contains('dark'))">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13.5 10A6 6 0 016 2.5a6 6 0 100 11 6 6 0 007.5-3.5z"/></svg>
        </div>
        <button class="btn-primary" onclick="openCreateHabit()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
          New Habit
        </button>
      </div>
    </div>

    <div class="page-body">
      <!-- Habit grid (populated by JS or shown statically) -->
      <div class="habits-grid" id="habits-grid"></div>

      <!-- Empty state shown when no habits exist -->
      <div id="habits-empty" style="display:none; text-align:center; padding:60px 20px; color:var(--text-3);">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:16px;opacity:.4"><circle cx="24" cy="24" r="20"/><path d="M24 14v10l6 6"/></svg>
        <p style="font-size:1.05rem;font-weight:500;margin-bottom:6px;">No habits yet</p>
        <p style="font-size:.9rem;">Click <strong>New Habit</strong> to start building a streak.</p>
      </div>
    </div>
  </div>
</div>

<!-- ── Create / Edit Habit Modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="habit-modal" style="display:none;" onclick="closeHabitModal(event)">
  <div class="modal-box" style="max-width:480px;width:100%;" onclick="event.stopPropagation()">

    <div class="modal-title" id="habit-modal-title">Create Habit</div>
    <div class="modal-sub" id="habit-modal-sub">Track a recurring behaviour to build streaks</div>

    <div style="display:flex;flex-direction:column;gap:14px;margin-top:20px;">

      <!-- Name -->
      <div class="field-group" style="margin-bottom:0">
        <label class="field-label">Habit name</label>
        <input class="field-input" id="habit-name" type="text" placeholder="e.g. Read for 20 minutes">
      </div>

      <!-- Description -->
      <div class="field-group" style="margin-bottom:0">
        <label class="field-label">Description <span style="font-weight:400;opacity:.6">(optional)</span></label>
        <textarea class="field-textarea" id="habit-desc" placeholder="Why does this habit matter to you?" style="min-height:72px;"></textarea>
      </div>

      <!-- Frequency -->
      <div class="field-group" style="margin-bottom:0">
        <label class="field-label">Frequency</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="freq-btns">
          <button class="prio-btn low sel" data-freq="daily"   onclick="selectFreq(this)">Daily</button>
          <button class="prio-btn medium"  data-freq="weekdays" onclick="selectFreq(this)">Weekdays</button>
          <button class="prio-btn medium"  data-freq="custom"  onclick="selectFreq(this)">Custom</button>
        </div>
      </div>

      <!-- Custom day picker (only visible when "Custom" is selected) -->
      <div id="custom-days" style="display:none;">
        <label class="field-label">Repeat on</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="prio-btn medium day-btn" data-day="Mon" onclick="toggleDay(this)">Mon</button>
          <button class="prio-btn medium day-btn" data-day="Tue" onclick="toggleDay(this)">Tue</button>
          <button class="prio-btn medium day-btn" data-day="Wed" onclick="toggleDay(this)">Wed</button>
          <button class="prio-btn medium day-btn" data-day="Thu" onclick="toggleDay(this)">Thu</button>
          <button class="prio-btn medium day-btn" data-day="Fri" onclick="toggleDay(this)">Fri</button>
          <button class="prio-btn medium day-btn" data-day="Sat" onclick="toggleDay(this)">Sat</button>
          <button class="prio-btn medium day-btn" data-day="Sun" onclick="toggleDay(this)">Sun</button>
        </div>
      </div>


      <!-- Category / colour tag -->
      <div class="field-group" style="margin-bottom:0">
        <label class="field-label">Category</label>
        <select class="field-select" id="habit-category">
          <option value="Health">Health</option>
          <option value="Fitness">Fitness</option>
          <option value="Learning">Learning</option>
          <option value="Mindfulness">Mindfulness</option>
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Other">Other</option>
        </select>
      </div>

    </div>

    <div class="modal-actions" style="margin-top:24px;">
      <button class="btn-outline" onclick="closeHabitModal()">Cancel</button>
      <button class="btn-save" onclick="saveHabit()">Save Habit</button>
    </div>
  </div>
</div>

<!-- ── Delete Habit Modal ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="delete-habit-modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">Delete habit?</div>
    <div class="modal-sub">This will remove all streak data. This cannot be undone.</div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeDeleteHabitModal()">Cancel</button>
      <button class="btn-save" style="background:#dc2626;box-shadow:none;" onclick="confirmDeleteHabit()">Delete</button>
    </div>
  </div>
</div>

<!-- ── Habits page logic ──────────────────────────────────────────────────── -->
<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let habits = JSON.parse(localStorage.getItem('strata_habits') || '[]');
  let editingHabitId   = null;
  let deletingHabitId  = null;
  let selectedFreq     = 'daily';
  let selectedDays     = [];

  // ── Init ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    renderHabits();
    // sync dark mode from dashboard state
    try {
      const s = JSON.parse(localStorage.getItem('strata_state') || '{}');
      if (s.darkMode) document.body.classList.add('dark');
    } catch(e) {}
  });

  // ── Render ────────────────────────────────────────────────────────────────
  const habitIcon = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="8"/><path d="M10 6v4l2.5 2.5"/></svg>`;
  const checkIcon = `<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 5l2.5 2.5 4.5-4.5"/></svg>`;
  const flameIcon = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1c0 3-3 4-3 6.5C3 9.4 4.3 11 6 11s3-1.6 3-3.5C9 5 6 4 6 1z"/></svg>`;

  function renderHabits() {
    const grid  = document.getElementById('habits-grid');
    const empty = document.getElementById('habits-empty');
    grid.innerHTML = '';

    if (!habits.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const now = new Date();
    now.setHours(0,0,0,0);

    habits.forEach(h => {
      const streak       = calcStreak(h);
      const todayStr     = now.toDateString();
      const todayDone    = (h.completions || []).includes(todayStr);
      const todayScheduled = isScheduledDay(h, now);

      // Last 7 days sliding window
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const label     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
        const scheduled = isScheduledDay(h, d);
        days.push({ label, dateStr: d.toDateString(), done: (h.completions || []).includes(d.toDateString()), isToday: i === 0, scheduled });
      }

      const card = document.createElement('div');
      card.className = 'habit-card';
      card.innerHTML = `
        <div class="habit-card-top">
          <div class="habit-card-icon">${habitIcon}</div>
          <div style="display:flex;gap:4px;">
            <span class="habit-card-menu" title="Edit" onclick="openEditHabit(${h.id})" style="color:var(--text-3)">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2l3 3-6 6H3v-3L9 2z"/></svg>
            </span>
            <span class="habit-card-menu" title="Delete" onclick="openDeleteHabit(${h.id})">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3.5h10M5.5 3.5V2.5h3v1M4 3.5l.5 7.5h5l.5-7.5"/></svg>
            </span>
          </div>
        </div>
        <div class="habit-card-name">${h.name}</div>
        <div class="habit-card-freq">${freqLabel(h.frequency, h.customDays)}${h.desc ? ' · ' + h.desc : ''}</div>
        <div class="habit-week-row">
          ${days.map(d => `
            <div class="hw-cell ${d.done ? 'done' : ''} ${d.isToday ? 'today' : ''} ${!d.scheduled ? 'off' : ''}"
                 ${d.scheduled ? `onclick="toggleHabitDay(${h.id}, '${d.dateStr}')"` : ''}>
              <span class="hw-day">${d.label}</span>
              <span class="hw-check">${checkIcon}</span>
            </div>`).join('')}
        </div>
        <div class="habit-card-bottom">
          <div class="streak-badge">${flameIcon} ${streak} day streak</div>
          ${todayScheduled
            ? `<button class="habit-complete-btn ${todayDone ? 'done' : 'todo'}" onclick="toggleHabitToday(${h.id})">
                 ${todayDone ? 'Done today' : 'Mark today'}
               </button>`
            : `<span style="font-size:.78rem;color:var(--text-3);">Not scheduled today</span>`}
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function freqLabel(freq, customDays) {
    if (freq === 'daily')    return 'Daily';
    if (freq === 'weekdays') return 'Weekdays';
    if (freq === 'custom')   return (customDays || []).join(', ') || 'Custom';
    return freq;
  }

  function isScheduledDay(h, date) {
    const dayName  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
    const weekdays = ['Mon','Tue','Wed','Thu','Fri'];
    if (h.frequency === 'daily')    return true;
    if (h.frequency === 'weekdays') return weekdays.includes(dayName);
    if (h.frequency === 'custom')   return (h.customDays || []).includes(dayName);
    return true;
  }

  function calcStreak(h) {
    const comps = (h.completions || []).slice().sort();
    if (!comps.length) return 0;
    let streak = 0;
    let cursor = new Date();
    cursor.setHours(0,0,0,0);
    for (let i = comps.length - 1; i >= 0; i--) {
      const d = new Date(comps[i]);
      d.setHours(0,0,0,0);
      const diff = (cursor - d) / 86400000;
      if (diff <= 1) { streak++; cursor = d; }
      else break;
    }
    return streak;
  }

  // ── Create / Edit Modal ───────────────────────────────────────────────────
  function openCreateHabit() {
    editingHabitId = null;
    document.getElementById('habit-modal-title').textContent = 'Create Habit';
    document.getElementById('habit-modal-sub').textContent   = 'Track a recurring behaviour to build streaks';
    document.getElementById('habit-name').value      = '';
    document.getElementById('habit-desc').value      = '';
    document.getElementById('habit-category').value  = 'Health';
    setFreq('daily');
    document.getElementById('habit-modal').style.display = 'flex';
  }

  function openEditHabit(id) {
    const h = habits.find(x => x.id === id);
    if (!h) return;
    editingHabitId = id;
    document.getElementById('habit-modal-title').textContent = 'Edit Habit';
    document.getElementById('habit-modal-sub').textContent   = 'Update your habit details';
    document.getElementById('habit-name').value      = h.name;
    document.getElementById('habit-desc').value      = h.desc || '';
    document.getElementById('habit-category').value  = h.category || 'Health';
    setFreq(h.frequency || 'daily', h.customDays || []);
    document.getElementById('habit-modal').style.display = 'flex';
  }

  function closeHabitModal(e) {
    if (e && e.target !== document.getElementById('habit-modal')) return;
    document.getElementById('habit-modal').style.display = 'none';
  }

  function setFreq(freq, days) {
    selectedFreq = freq;
    selectedDays = days ? [...days] : [];
    document.querySelectorAll('#freq-btns button').forEach(b => {
      b.classList.toggle('sel', b.dataset.freq === freq);
      b.classList.toggle('low', b.dataset.freq === freq);
      b.classList.toggle('medium', b.dataset.freq !== freq);
    });
    document.getElementById('custom-days').style.display = freq === 'custom' ? 'block' : 'none';
    document.querySelectorAll('.day-btn').forEach(b => {
      b.classList.toggle('sel', selectedDays.includes(b.dataset.day));
      b.classList.toggle('low', selectedDays.includes(b.dataset.day));
      b.classList.toggle('medium', !selectedDays.includes(b.dataset.day));
    });
  }

  function selectFreq(btn) {
    setFreq(btn.dataset.freq, []);
  }

  function toggleDay(btn) {
    const day = btn.dataset.day;
    if (selectedDays.includes(day)) {
      selectedDays = selectedDays.filter(d => d !== day);
    } else {
      selectedDays.push(day);
    }
    btn.classList.toggle('sel', selectedDays.includes(day));
    btn.classList.toggle('low', selectedDays.includes(day));
    btn.classList.toggle('medium', !selectedDays.includes(day));
  }

  function saveHabit() {
    const name = document.getElementById('habit-name').value.trim();
    if (!name) { alert('Please enter a habit name.'); return; }

    if (editingHabitId !== null) {
      const h = habits.find(x => x.id === editingHabitId);
      if (h) {
        h.name       = name;
        h.desc       = document.getElementById('habit-desc').value.trim();
        h.frequency  = selectedFreq;
        h.customDays = [...selectedDays];
        h.category   = document.getElementById('habit-category').value;
      }
    } else {
      habits.push({
        id:          Date.now(),
        name,
        desc:        document.getElementById('habit-desc').value.trim(),
        frequency:   selectedFreq,
        customDays:  [...selectedDays],
        category:    document.getElementById('habit-category').value,
        completions: [],
        createdAt:   new Date().toISOString()
      });
    }

    localStorage.setItem('strata_habits', JSON.stringify(habits));
    document.getElementById('habit-modal').style.display = 'none';
    renderHabits();
  }

  // ── Delete Modal ──────────────────────────────────────────────────────────
  function openDeleteHabit(id) {
    deletingHabitId = id;
    document.getElementById('delete-habit-modal').style.display = 'flex';
  }

  function closeDeleteHabitModal() {
    document.getElementById('delete-habit-modal').style.display = 'none';
    deletingHabitId = null;
  }

  function confirmDeleteHabit() {
    habits = habits.filter(h => h.id !== deletingHabitId);
    localStorage.setItem('strata_habits', JSON.stringify(habits));
    closeDeleteHabitModal();
    renderHabits();
  }

  // ── Toggle a specific day ─────────────────────────────────────────────────
  function toggleHabitDay(id, dateStr) {
    const h = habits.find(x => x.id === id);
    if (!h) return;
    if ((h.completions || []).includes(dateStr)) {
      h.completions = h.completions.filter(d => d !== dateStr);
    } else {
      h.completions = [...(h.completions || []), dateStr];
    }
    localStorage.setItem('strata_habits', JSON.stringify(habits));
    renderHabits();
  }

  // ── Toggle done today ─────────────────────────────────────────────────────
  function toggleHabitToday(id) {
    const h = habits.find(x => x.id === id);
    if (!h) return;
    const today = new Date().toDateString();
    if ((h.completions || []).includes(today)) {
      h.completions = h.completions.filter(d => d !== today);
    } else {
      h.completions = [...(h.completions || []), today];
    }
    localStorage.setItem('strata_habits', JSON.stringify(habits));
    renderHabits();
  }

  // ── Dark mode toggle ──────────────────────────────────────────────────────
  function setDarkMode(on) {
    document.body.classList.toggle('dark', on);
    try {
      const s = JSON.parse(localStorage.getItem('strata_state') || '{}');
      s.darkMode = on;
      localStorage.setItem('strata_state', JSON.stringify(s));
    } catch(e) {}
  }

  function handleLogout() {
    window.location.href = 'login.html';
  }
</script>

<style>
  .habits-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .hw-cell.off {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
  }
</style>

</body>
</html>
